name: 🛡️ Build Stealth Survey APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          
      - name: 📁 Create Android project structure
        run: |
          # إنشاء هيكل مشروع Android بسيط
          mkdir -p app/src/main/java/com/stealth/browser
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # نسخ الملفات من مكانها الحالي إلى الهيكل الجديد
          cp AndroidManifest.xml app/src/main/ 2>/dev/null || true
          cp MainActivity.java app/src/main/java/com/stealth/browser/ 2>/dev/null || true
          cp activity_main.xml app/src/main/res/layout/ 2>/dev/null || true
          
          # إنشاء strings.xml بسيط
          echo '<resources><string name="app_name">Stealth Survey</string></resources>' > app/src/main/res/values/strings.xml
          
          # إنشاء build.gradle للتطبيق
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.stealth.browser'
              compileSdk 34
              defaultConfig {
                  applicationId "com.stealth.browser"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.7.0'
          }
          EOF
          
          # إنشاء settings.gradle في الجذر
          echo "include ':app'" > settings.gradle
          
          # إنشاء build.gradle في الجذر
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

      - name: 🛠️ Build APK with Gradle
        run: |
          gradle assembleRelease
          
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StealthSurvey
          path: app/build/outputs/apk/release/*.apk
